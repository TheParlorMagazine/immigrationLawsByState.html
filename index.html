<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Immigration Enforcement Laws by State (2024–2025)</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Libre+Baskerville:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0c0c0c;
      --bg2:#111111;
      --bg3:#161616;
      --text:#f5f0e8;
      --muted:#8a8478;
      --accent:#e8c547;
      --border:rgba(245,240,232,0.1);
      --c0:#1a1a1a;
      --c1:#1a2a1a;
      --c2:#2d5a2d;
      --c3:#4a9e4a;
      --c4:#7ee787;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100%;height:100%;
      background:var(--bg);
      color:var(--text);
      font-family:'DM Sans',sans-serif;
      overflow:hidden;
    }

    .wrap{
      width:100%;height:100%;
      display:flex;flex-direction:column;
      padding:20px 24px 16px;
    }

    .header{
      display:flex;justify-content:space-between;align-items:flex-start;
      margin-bottom:12px;
      flex-shrink:0;
    }
    .header-left{}
    h1{
      font-family:'Bebas Neue',sans-serif;
      font-size:18px;letter-spacing:0.1em;
      color:var(--text);margin-bottom:4px;
    }
    p.meta{
      font-size:11px;color:var(--muted);
      font-family:'Libre Baskerville',serif;
      font-style:italic;
    }
    .source-tag{
      font-size:9px;font-weight:500;letter-spacing:0.15em;
      text-transform:uppercase;color:var(--accent);
      border:1px solid rgba(232,197,71,0.3);
      padding:4px 10px;white-space:nowrap;
      flex-shrink:0;
    }

    /* MAP CONTAINER */
    .viz{
      position:relative;
      flex:1;
      min-height:0;
      border:1px solid var(--border);
      background:var(--bg2);
    }
    svg{
      width:100%;
      height:100%;
      display:block;
    }

    .state{
      stroke:rgba(245,240,232,0.5);
stroke-width:1;
      cursor:default;
      outline:none;
      transition:opacity 0.15s;
    }
    .state.has-laws{
      cursor:pointer;
    }
    .state.has-laws:hover{
      opacity:0.75;
      stroke:var(--accent);
      stroke-width:1.5;
    }
    .state:focus-visible{
      stroke:var(--accent);
      stroke-width:2;
    }

    /* LEGEND */
    .legend{
      display:flex;gap:16px;align-items:center;
      margin-top:10px;flex-shrink:0;
      flex-wrap:wrap;
    }
    .legend-item{
      display:flex;align-items:center;gap:6px;
      font-size:10px;letter-spacing:0.05em;
      text-transform:uppercase;color:var(--muted);
    }
    .swatch{
      width:12px;height:12px;
      border:1px solid rgba(245,240,232,0.1);
      flex-shrink:0;
    }

    /* TOOLTIP */
    .tooltip{
  position:absolute;
  min-width:240px;max-width:380px;
  max-height:400px;
  overflow-y:auto;
  background:rgba(12,12,12,0.98);
  border:1px solid var(--border);
  box-shadow:0 8px 32px rgba(0,0,0,0.6);
  padding:14px;
  font-size:12px;line-height:1.4;
  pointer-events:auto;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .12s ease, transform .12s ease;
  z-index:10;
}
    .tooltip.show{opacity:1;transform:translateY(0);}
    .tooltip h2{
      font-family:'Bebas Neue',sans-serif;
      font-size:16px;letter-spacing:0.08em;
      color:var(--text);margin-bottom:8px;
    }
    .tooltip .count{
      color:var(--accent);font-size:12px;
      font-family:'DM Sans',sans-serif;
    }
    .tooltip ul{
      margin:8px 0 0;padding:0;
      list-style:none;
      display:flex;flex-direction:column;gap:10px;
    }
    .tooltip li{
      padding-bottom:10px;
      border-bottom:1px solid var(--border);
    }
    .tooltip li:last-child{border-bottom:none;padding-bottom:0;}
    .bill-name{
      font-family:'DM Sans',sans-serif;
      font-size:11px;font-weight:500;
      color:var(--text);margin-bottom:3px;
    }
    .bill-year{
      display:inline-block;
      font-size:9px;letter-spacing:0.1em;
      text-transform:uppercase;
      padding:2px 6px;
      border:1px solid rgba(232,197,71,0.3);
      color:var(--accent);
      margin-left:6px;
      vertical-align:middle;
    }
    .bill-summary{
      font-family:'Libre Baskerville',serif;
      font-size:11px;font-style:italic;
      color:var(--muted);margin-top:4px;
      line-height:1.5;
    }
    .bill-status{
      font-size:10px;color:var(--muted);
      margin-top:3px;letter-spacing:0.03em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="header-left">
        <h1>Immigration Enforcement Laws by State</h1>
        <p class="meta">Hover a state to see enacted enforcement measures — 2024–2025</p>
      </div>
      <div class="source-tag">NCSL Data</div>
    </div>

    <div class="viz" id="viz">
      <div class="tooltip" id="tooltip" role="dialog" aria-live="polite"></div>
      <svg id="map" viewBox="0 0 975 610" preserveAspectRatio="xMidYMid meet" aria-label="Map of the United States showing immigration enforcement legislation by state"></svg>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="swatch" style="background:#1a1a1a;"></div>No laws in scope</div>
      <div class="legend-item"><div class="swatch" style="background:#1a2a1a;"></div>1–2 laws</div>
      <div class="legend-item"><div class="swatch" style="background:#2d5a2d;"></div>3–5 laws</div>
      <div class="legend-item"><div class="swatch" style="background:#7ee787;"></div>6+ laws</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script>
    async function loadData() {
      const endpoint = "https://theparlormagazine.com/_functions/immigrationLawsByState";
      const res = await fetch(endpoint, { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load: " + res.status);
      return res.json();
    }

    const fipsToUSPS = new Map([
      [1,"AL"],[2,"AK"],[4,"AZ"],[5,"AR"],[6,"CA"],[8,"CO"],[9,"CT"],[10,"DE"],[11,"DC"],
      [12,"FL"],[13,"GA"],[15,"HI"],[16,"ID"],[17,"IL"],[18,"IN"],[19,"IA"],[20,"KS"],[21,"KY"],
      [22,"LA"],[23,"ME"],[24,"MD"],[25,"MA"],[26,"MI"],[27,"MN"],[28,"MS"],[29,"MO"],[30,"MT"],
      [31,"NE"],[32,"NV"],[33,"NH"],[34,"NJ"],[35,"NM"],[36,"NY"],[37,"NC"],[38,"ND"],[39,"OH"],
      [40,"OK"],[41,"OR"],[42,"PA"],[44,"RI"],[45,"SC"],[46,"SD"],[47,"TN"],[48,"TX"],[49,"UT"],
      [50,"VT"],[51,"VA"],[53,"WA"],[54,"WV"],[55,"WI"],[56,"WY"]
    ]);

    const uspsToName = {
      AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",
      CT:"Connecticut",DE:"Delaware",DC:"District of Columbia",FL:"Florida",GA:"Georgia",
      HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",
      LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",
      MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",
      NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",
      OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",
      SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",
      WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"
    };

    function fillForCount(n){
      if(!n) return "#1a1a1a";
      if(n<=2) return "#1a2a1a";
      if(n<=5) return "#2d5a2d";
      return "#7ee787";
    }

    const svg=d3.select("#map");
    const tooltip=document.getElementById("tooltip");
    const viz=document.getElementById("viz");
    const TOPO_URL="https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json";

    Promise.all([d3.json(TOPO_URL),loadData()])
      .then(([us,lawsByState])=>{
        const states=topojson.feature(us,us.objects.states).features;
        const projection=d3.geoAlbersUsa().translate([975/2,610/2]).scale(1300);
        const path=d3.geoPath(projection);

        svg.append("g")
          .selectAll("path")
          .data(states)
          .join("path")
          .attr("d",path)
          .attr("class",d=>{
            const usps=fipsToUSPS.get(+d.id);
            const has=usps&&lawsByState[usps]&&lawsByState[usps].length>0;
            return `state${has?" has-laws":""}`;
          })
          .attr("tabindex",d=>{
            const usps=fipsToUSPS.get(+d.id);
            return usps&&lawsByState[usps]?.length>0?0:-1;
          })
          .attr("role",d=>{
            const usps=fipsToUSPS.get(+d.id);
            return usps&&lawsByState[usps]?.length>0?"button":"img";
          })
          .attr("aria-label",d=>{
            const usps=fipsToUSPS.get(+d.id);
            const name=uspsToName[usps]||"State";
            const count=lawsByState[usps]?.length||0;
            return count?`${name}: ${count} enforcement law${count===1?"":"s"}`:`${name}: no enforcement laws in scope`;
          })
          .attr("fill",d=>{
            const usps=fipsToUSPS.get(+d.id);
            return fillForCount(lawsByState[usps]?.length||0);
          })
          .on("click",function(event,d){
  event.stopPropagation();
  showTooltip(event,d,lawsByState);
  tooltip.dataset.pinned='true';
})
.on("mouseenter",function(event,d){showTooltip(event,d,lawsByState);})
.on("mousemove",function(event){
  if(!tooltip.dataset.pinned) moveTooltip(event);
})
.on("mouseleave",function(){
  if(!tooltip.dataset.pinned) hideTooltip();
})
          .on("focus",function(event,d){showTooltip(event,d,lawsByState,true);})
          .on("blur",function(){hideTooltip();});

        // State borders
        svg.append("path")
          .datum(topojson.mesh(us,us.objects.states,(a,b)=>a!==b))
          .attr("fill","none")
          .attr("stroke","rgba(245,240,232,0.5)")
.attr("stroke-width",1)
          .attr("d",path);

        function showTooltip(event,d,lawsByState,fromKeyboard=false){
          const usps=fipsToUSPS.get(+d.id);
          const records=lawsByState[usps]||[];
          if(!records.length) return;
          const name=uspsToName[usps]||usps;

          const items=records.slice(0,8).map(r=>`
            <li>
              <div class="bill-name">${escapeHtml(r.bill||"")} <span class="bill-year">${escapeHtml(String(r.year||""))}</span></div>
              <div class="bill-summary">${escapeHtml(r.summary||"")}</div>
              <div class="bill-status">${escapeHtml(r.status_detail||"")} · ${escapeHtml(r.last_action_date||"")}</div>
            </li>
          `).join("");

          tooltip.innerHTML=`
            <h2>${escapeHtml(name)} <span class="count">${records.length} law${records.length===1?"":"s"}</span></h2>
            <ul>${items}</ul>
            ${records.length>8?`<div style="color:var(--muted);font-size:10px;margin-top:8px;letter-spacing:0.05em;">+${records.length-8} more</div>`:""}
          `;
          tooltip.classList.add("show");

          if(fromKeyboard){
            const rect=viz.getBoundingClientRect();
            tooltip.style.left=(rect.width/2-180)+"px";
            tooltip.style.top="18px";
          } else {
            moveTooltip(event);
          }
        }

        function moveTooltip(event){
          const rect=viz.getBoundingClientRect();
          const x=event.clientX-rect.left;
          const y=event.clientY-rect.top;
          const pad=12;
          const ttW=tooltip.offsetWidth||320;
          const ttH=tooltip.offsetHeight||160;
          let left=x+14,top=y+14;
          if(left+ttW+pad>rect.width) left=x-ttW-14;
          if(top+ttH+pad>rect.height) top=y-ttH-14;
          left=Math.max(pad,Math.min(left,rect.width-ttW-pad));
          top=Math.max(pad,Math.min(top,rect.height-ttH-pad));
          tooltip.style.left=left+"px";
          tooltip.style.top=top+"px";
        }

        function hideTooltip(){tooltip.classList.remove("show");}

        function escapeHtml(str){
          return String(str).replace(/[&<>"']/g,s=>({
            "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
          }[s]));
        }
      })
      .catch(err=>{
        viz.innerHTML=`<div style="padding:32px;font-family:'DM Sans',sans-serif;color:var(--muted);font-size:13px;">
          Map failed to load — ${String(err)}
        </div>`;
      });
    document.addEventListener('click',()=>{
  tooltip.dataset.pinned='';
  hideTooltip();
});
  </script>
</body>
</html>
